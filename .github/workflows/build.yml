name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Surface build errors on failure
        if: failure()
        run: |
          {
            echo '### ❌ Derleme hatası'
            echo
            echo '```'
            grep -E "^e: |^w: |FAILURE:|What went wrong|> Task .* FAILED" build.log | head -80 || tail -n 80 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk Odak.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Odak-apk
          path: Odak.apk

      - name: Publish to "latest" release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Odak — En güncel sürüm
          body: |
            En güncel **Odak** APK'sı. Telefonuna indir, "Bilinmeyen kaynaklar"a izin ver ve kur.
            Doğrudan indirme: [Odak.apk](https://github.com/${{ github.repository }}/releases/latest/download/Odak.apk)
          files: Odak.apk
          make_latest: true
